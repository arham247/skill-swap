{% extends "base.html" %}

{% block title %}Edit Profile | SkillSwap{% endblock %}

{% block content %}
<section class="panel">
    <p class="eyebrow">Account settings</p>
    <h1>Update your profile</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-button">Save Changes</button>
    </form>
</section>
{% endblock %}
