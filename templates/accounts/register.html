{% extends "base.html" %}

{% block title %}Register | SkillSwap{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <div>
        <p class="eyebrow">Sprint 1</p>
        <h1>Create your SkillSwap account</h1>
        <p class="muted">Join as a learner or tutor and start publishing your skills.</p>
    </div>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-button">Register</button>
    </form>
</section>
{% endblock %}
