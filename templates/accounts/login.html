{% extends "base.html" %}

{% block title %}Login | SkillSwap{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <div>
        <p class="eyebrow">Welcome back</p>
        <h1>Login to manage your learning marketplace</h1>
        <p class="muted">Use your SkillSwap username and password to continue.</p>
    </div>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-button">Login</button>
    </form>
    <a class="inline-link" href="{% url 'password_reset_request' %}">Forgot password? Reset via OTP</a>
</section>
{% endblock %}
