{% extends "base.html" %}

{% block title %}Verify OTP | SkillSwap{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <div>
        <p class="eyebrow">OTP verification</p>
        <h1>Set a new password</h1>
        <p class="muted">OTP codes expire after 10 minutes.</p>
    </div>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-button">Reset Password</button>
    </form>
</section>
{% endblock %}
