{% extends "base.html" %}

{% block title %}Request Session | SkillSwap{% endblock %}

{% block content %}
<section class="panel">
    <p class="eyebrow">Booking request</p>
    <h1>{{ listing.title }}</h1>
    <p class="muted">Tutor: {{ listing.tutor.username }}</p>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-button">Send Request</button>
    </form>
</section>
{% endblock %}
